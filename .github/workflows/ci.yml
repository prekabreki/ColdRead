name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ColdRead + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Lint (ruff check)
        run: ruff check vo_format/ tests/

      - name: Format (ruff format)
        run: ruff format --check vo_format/ tests/

      - name: Test (pytest)
        run: python -m pytest tests/
